services:
  - type: web
    name: cs-ranking-hub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: FIREBASE_KEY_B64
        sync: false
      - key: STEAM_API_KEY
        sync: false
